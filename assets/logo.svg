<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true">
  <defs>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B265F"/>
      <stop offset="100%" stop-color="#2F4DAB"/>
    </linearGradient>
    <linearGradient id="g-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="55%" stop-color="#F47A1F"/>
      <stop offset="100%" stop-color="#E63E2C"/>
    </linearGradient>
  </defs>
  <!-- Top blue bar (parallelogram) -->
  <polygon points="50,20 130,20 110,90 30,90" fill="url(#g-blue)"/>
  <!-- Top orange bar -->
  <polygon points="120,20 175,20 155,90 100,90" fill="url(#g-orange)"/>
  <!-- Bottom blue bar -->
  <polygon points="45,110 100,110 80,180 25,180" fill="url(#g-blue)"/>
  <!-- Bottom orange bar -->
  <polygon points="90,110 170,110 150,180 70,180" fill="url(#g-orange)"/>
</svg>
