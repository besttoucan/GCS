<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 720" preserveAspectRatio="xMidYMax slice" role="img" aria-label="Stylized New York City skyline at twilight">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07091c"/>
      <stop offset="0.55" stop-color="#1B265F"/>
      <stop offset="0.82" stop-color="#5A3A6A"/>
      <stop offset="0.95" stop-color="#F47A1F" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F47A1F" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243066" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0d1330"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141a3d"/>
      <stop offset="1" stop-color="#070a1a"/>
    </linearGradient>
    <linearGradient id="near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080a18"/>
      <stop offset="1" stop-color="#03040a"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff5e2" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#fff5e2" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#fff5e2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="1" r="0.6">
      <stop offset="0" stop-color="#F47A1F" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F47A1F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="720" fill="url(#sky)"/>

  <!-- Horizon glow at sunset -->
  <ellipse cx="1280" cy="690" rx="900" ry="180" fill="url(#glow)"/>

  <!-- Moon -->
  <circle cx="1640" cy="170" r="42" fill="url(#moon)"/>
  <circle cx="1640" cy="170" r="22" fill="#fff5e2" fill-opacity="0.9"/>

  <!-- Stars -->
  <g fill="#ffffff" fill-opacity="0.85">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="240" cy="140" r="0.9"/>
    <circle cx="380" cy="60" r="1.1"/>
    <circle cx="520" cy="120" r="0.8"/>
    <circle cx="660" cy="200" r="1.3"/>
    <circle cx="800" cy="90" r="0.9"/>
    <circle cx="960" cy="150" r="1.0"/>
    <circle cx="1100" cy="60" r="1.2"/>
    <circle cx="1260" cy="220" r="0.9"/>
    <circle cx="1440" cy="100" r="1.1"/>
    <circle cx="1820" cy="260" r="0.8"/>
    <circle cx="60" cy="240" r="1.0"/>
    <circle cx="320" cy="300" r="0.9"/>
    <circle cx="1880" cy="80" r="1.0"/>
  </g>

  <!-- Far skyline (Bronx / Upper Manhattan vibes) -->
  <path fill="url(#far)" d="
    M0,720 L0,520
    L80,520 L80,500 L140,500 L140,460 L200,460 L200,500 L260,500
    L260,440 L300,440 L300,420 L340,420 L340,460 L400,460
    L400,400 L440,400 L440,380 L460,380 L460,360 L500,360 L500,400 L560,400
    L560,440 L620,440 L620,400 L680,400 L680,360 L720,360 L720,340 L760,340 L760,380 L820,380
    L820,420 L880,420 L880,380 L940,380 L940,340 L980,340 L980,320 L1020,320 L1020,360 L1080,360
    L1080,400 L1140,400 L1140,360 L1200,360 L1200,320 L1240,320 L1240,300 L1280,300 L1280,340 L1340,340
    L1340,380 L1400,380 L1400,340 L1460,340 L1460,300 L1520,300 L1520,340 L1580,340
    L1580,380 L1640,380 L1640,340 L1700,340 L1700,300 L1760,300 L1760,340 L1820,340 L1820,380 L1920,380
    L1920,720 Z"/>

  <!-- Mid skyline (Midtown — Empire State / Chrysler-inspired) -->
  <g fill="url(#mid)">
    <!-- Building cluster -->
    <path d="M0,720 L0,560
      L60,560 L60,520 L120,520 L120,560 L160,560 L160,500 L210,500 L210,560
      L260,560 L260,520 L310,520 L310,480 L360,480 L360,520 L410,520 L410,560
      L470,560 L470,500 L510,500 L510,460 L540,460 L540,420 L560,420 L560,400
      L580,400 L580,420 L600,420 L600,460 L630,460 L630,500 L680,500 L680,540
      L740,540 L740,500 L780,500 L780,460 L820,460 L820,420 L850,420 L850,380
      L870,380 L870,340 L890,340 L890,300 L910,300 L910,270 L930,270
      L930,300 L950,300 L950,340 L970,340 L970,380 L1000,380 L1000,420
      L1040,420 L1040,460 L1080,460 L1080,500 L1130,500 L1130,540 L1180,540
      L1180,500 L1230,500 L1230,460 L1270,460 L1270,420 L1300,420 L1300,380
      L1320,380 L1320,340 L1340,340 L1340,300 L1360,300 L1360,270 L1380,270 L1380,240
      L1400,240 L1400,210 L1420,210 L1420,240 L1440,240 L1440,270 L1460,270
      L1460,300 L1480,300 L1480,340 L1500,340 L1500,380 L1530,380 L1530,420 L1570,420
      L1570,460 L1610,460 L1610,500 L1660,500 L1660,540
      L1720,540 L1720,500 L1780,500 L1780,540 L1840,540 L1840,500 L1920,500
      L1920,720 Z"/>
    <!-- Empire State spire -->
    <rect x="900" y="250" width="20" height="30"/>
    <polygon points="910,230 904,250 916,250"/>
    <!-- Chrysler-style spire -->
    <rect x="1408" y="190" width="14" height="22"/>
    <polygon points="1415,170 1410,190 1420,190"/>
  </g>

  <!-- One World Trade spire (downtown emphasis, right of center) -->
  <g fill="#070a1a">
    <rect x="1145" y="320" width="38" height="240"/>
    <polygon points="1164,310 1145,320 1183,320"/>
    <rect x="1162" y="270" width="4" height="50"/>
  </g>

  <!-- Near skyline (foreground, darkest) -->
  <path fill="url(#near)" d="
    M0,720 L0,640
    L80,640 L80,600 L160,600 L160,620 L240,620 L240,580 L320,580 L320,620
    L400,620 L400,580 L480,580 L480,620 L560,620 L560,600 L620,600 L620,560
    L700,560 L700,600 L780,600 L780,620 L860,620 L860,580 L940,580 L940,620
    L1020,620 L1020,600 L1100,600 L1100,580 L1180,580 L1180,620
    L1260,620 L1260,580 L1340,580 L1340,620 L1420,620 L1420,600 L1500,600 L1500,580
    L1580,580 L1580,620 L1660,620 L1660,580 L1740,580 L1740,620 L1820,620 L1820,600
    L1920,600 L1920,720 Z"/>

  <!-- Tiny twinkling window lights — subtle warm dots -->
  <g fill="#FFB774" fill-opacity="0.85">
    <rect x="908" y="340" width="2" height="2"/>
    <rect x="916" y="360" width="2" height="2"/>
    <rect x="906" y="380" width="2" height="2"/>
    <rect x="918" y="400" width="2" height="2"/>
    <rect x="1158" y="350" width="2" height="2"/>
    <rect x="1168" y="370" width="2" height="2"/>
    <rect x="1156" y="400" width="2" height="2"/>
    <rect x="1170" y="430" width="2" height="2"/>
    <rect x="1160" y="460" width="2" height="2"/>
    <rect x="1413" y="220" width="2" height="2"/>
    <rect x="1413" y="240" width="2" height="2"/>
    <rect x="690" y="420" width="2" height="2"/>
    <rect x="690" y="450" width="2" height="2"/>
    <rect x="1310" y="400" width="2" height="2"/>
    <rect x="280" y="440" width="2" height="2"/>
    <rect x="1660" y="420" width="2" height="2"/>
    <rect x="1660" y="450" width="2" height="2"/>
    <rect x="1480" y="380" width="2" height="2"/>
  </g>
</svg>
